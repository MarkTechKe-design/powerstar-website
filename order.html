<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order & Collect - Powerstar Supermarkets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

<style>
    /* --- ARCHITECTURAL STYLING (The Skin) --- */
    :root {
        --ps-red: #DA291C;       /* Powerstar Red */
        --ps-green: #006838;     /* Powerstar Green */
        --ps-whatsapp: #25D366;  /* WhatsApp Brand Green */
        --gray-bg: #fdfdfd;
        --gray-border: #e9ecef;
        --text-dark: #2c3e50;
    }

    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--gray-bg); margin: 0; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

    .page-header {
        text-align: center; margin-bottom: 50px;
    }
    .page-header h1 { color: var(--ps-red); margin-bottom: 10px; }
    .page-header p { color: #666; font-size: 1.1rem; }

    /* The Grid System */
    .department-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
    }

    /* The Branch Card Design */
    .branch-card {
        background: white;
        border: 1px solid var(--gray-border);
        border-left: 5px solid var(--ps-red); /* Brand Accent */
        border-radius: 8px;
        padding: 25px;
        transition: all 0.3s ease;
        display: flex; flex-direction: column; justify-content: space-between;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    /* Hover Interaction */
    .branch-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0,0,0,0.08);
        border-left-color: var(--ps-green); /* Changes to Green on hover */
    }

    .card-header {
        display: flex; justify-content: space-between; align-items: flex-start;
        margin-bottom: 20px;
    }

    .branch-name {
        margin: 0; font-size: 1.3rem; font-weight: 700; color: var(--text-dark);
    }

    .branch-icon {
        color: #eee; font-size: 1.8rem; transition: color 0.3s;
    }
    .branch-card:hover .branch-icon { color: var(--ps-green); }

    .branch-details { margin-bottom: 25px; }
    
    .detail-row {
        display: flex; align-items: center; gap: 12px;
        color: #555; font-size: 0.95rem; margin-bottom: 10px;
    }
    .detail-row i { color: var(--ps-red); width: 20px; text-align: center; }

    /* The WhatsApp Button */
    .whatsapp-btn {
        background: #f8f9fa;
        color: var(--ps-green);
        text-decoration: none;
        padding: 14px;
        border-radius: 6px;
        font-weight: 700;
        text-align: center;
        border: 1px solid var(--ps-whatsapp);
        transition: all 0.2s;
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    
    .whatsapp-btn:hover {
        background: var(--ps-whatsapp);
        color: white;
        box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2);
    }
</style>
</head>
<body>

<main class="container">
    <div class="page-header">
        <h1>Select Your Branch</h1>
        <p>Choose a location below to start your order via WhatsApp.</p>
    </div>

    <div id="branchContainer" class="department-grid"></div>
</main>

<script>
    /* --- DATA LAYER: Your Branch List --- 
       I have updated all phone numbers to match your original request.
       I inferred the 'Location' based on the name. 
    */
    const branches = [
        { name: "Kasarani HQ",      phone: "0790 680 038", location: "Kasarani-Mwiki Road" },
        { name: "Naivasha Branch",  phone: "0768 016 429", location: "Naivasha Town" },
        { name: "Ruiru Jambo",      phone: "0728 020 018", location: "Ruiru Opposite Family Bank" },
        { name: "Ruiru Mini",       phone: "0724 588 900", location: "Ruiru Opposite Ruiru Ndani Stage" },
        { name: "Kangari Branch",   phone: "0710 976 254", location: "Kangari" },
        { name: "Joska Branch",     phone: "0791 047 850", location: "Joska Along Kangundo Road" },
        { name: "Express Branch",   phone: "0701 231 370", location: "Canopy Stage Along Kamiti Road" },
        { name: "Base Branch",      phone: "0707 881 200", location: "Base Area, Zimmerman" },
        { name: "Kitengela Branch", phone: "0704 121 122", location: "Kitengela CBD Next to Quickmart" },
        { name: "Kikuyu Branch",    phone: "0741 251 973", location: "Kikuyu Town" },
        { name: "Kinoo Branch",     phone: "0795 459 026", location: "Kinoo" }
    ];

    const container = document.getElementById('branchContainer');

    // Helper: Formats the WhatsApp Link correctly
    function getWhatsAppLink(phone, branchName) {
        // Removes spaces, removes leading zero, adds 254
        const cleanNumber = "254" + phone.replace(/\s/g, '').substring(1);
        const text = encodeURIComponent(`Hi Powerstar ${branchName}, I would like to order...`);
        return `https://wa.me/${cleanNumber}?text=${text}`;
    }

    // Render Logic: Loops through the list above and creates the HTML cards
    branches.forEach(branch => {
        const card = document.createElement('div');
        card.className = 'branch-card';
        
        // This HTML structure creates the clean "No-Photo" design
        card.innerHTML = `
            <div class="card-header">
                <h3 class="branch-name">${branch.name}</h3>
                <i class="fas fa-store branch-icon"></i>
            </div>
            
            <div class="branch-details">
                <div class="detail-row">
                    <i class="fas fa-map-marker-alt"></i> 
                    <span>${branch.location}</span>
                </div>
                <div class="detail-row">
                    <i class="fas fa-phone-alt"></i> 
                    <span>${branch.phone}</span>
                </div>
            </div>

            <a href="${getWhatsAppLink(branch.phone, branch.name)}" target="_blank" class="whatsapp-btn">
                <i class="fab fa-whatsapp"></i> Chat to Order
            </a>
        `;
        container.appendChild(card);
    });
</script>

</body>
</html>
