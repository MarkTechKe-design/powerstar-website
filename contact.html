<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Powerstar" style="height: 70px;">
        </a>
        
        <button class="mobile-toggle" id="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Products</a>
            <a href="branches.html">Branches</a>
            <a href="media.html">Media</a>
            <a href="loyalty.html">Loyalty</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="section-intro">
        <h2>Get in Touch</h2>
        <p>Chat with your local branch directly on WhatsApp.</p>
    </div>

    <div class="contact-container">

        <div class="contact-column">
            <h3 style="color: #006838; margin-bottom: 15px;"><i class="fab fa-whatsapp"></i> Customer Care</h3>
            <p style="margin-bottom: 25px; color: #666;">Chat with your branch manager.</p>
            
            <form id="customerForm">
                <label>Your Name</label>
                <input type="text" id="custName" placeholder="e.g. John Doe" required>
                
                <label>Select Branch</label>
                <select id="custBranch" required>
                    <option value="" disabled selected>-- Select Branch --</option>
                    <option value="Kasarani HQ">Kasarani HQ</option>
                    <option value="Joska">Joska</option>
                    <option value="Kangari">Kangari</option>
                    <option value="Naivasha">Naivasha</option>
                    <option value="Kitengela">Kitengela</option>
                    <option value="Kikuyu">Kikuyu</option>
                    <option value="Kinoo">Kinoo</option>
                    <option value="Ruiru Mini">Ruiru Mini</option>
                    <option value="Ruiru Jambo">Ruiru Jambo</option>
                    <option value="Zimmerman Base">Zimmerman Base</option>
                    <option value="Zimmerman Express">Zimmerman Express</option>
                </select>
                
                <label>Topic</label>
                <select id="custType">
                    <option>Compliment</option>
                    <option>Complaint</option>
                    <option>Inquiry</option>
                </select>
                
                <label>Message</label>
                <textarea id="custMessage" placeholder="Type your message..." required></textarea>
                
                <button type="submit" class="btn-customer">Chat with Branch</button>
            </form>
        </div>

        <div class="contact-column">
            <h3 style="color: #DA291C; margin-bottom: 15px;"><i class="fas fa-truck"></i> Sales & Marketing</h3>
            <p style="margin-bottom: 25px; color: #666;">Direct to HQ Sales Team.</p>
            
            <form id="vendorForm">
                <label>Company Name</label>
                <input type="text" id="vendCompany" placeholder="Company Name" required>
                
                <label>Contact Person</label>
                <input type="text" id="vendPerson" placeholder="Contact Person" required>
                
                <label>Inquiry Type</label>
                <select id="vendType">
                    <option>New Product Listing</option>
                    <option>General Inquiry</option>
                </select>
                
                <label>Proposal</label>
                <textarea id="vendMessage" placeholder="Brief proposal..." required></textarea>
                
                <button type="submit" class="btn-vendor">Chat with Sales</button>
            </form>
        </div>

    </div>
</main>

<footer>
    <div class="footer-content">
        <div class="social-links">
            <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Follow Us</h4>
            <div class="icons-container">
                <a href="https://www.facebook.com/PowerstarSupermarkets" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/powerstar_supermarket_limited" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@powerstar_supermarkets" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://x.com/powerstar_supermarket" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.linkedin.com/company/powerstar_supermarkets" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2025 Powerstar Supermarkets. All Rights Reserved.</p>
        </div>
    </div>
</footer>

<script>
    // WhatsApp Logic
    const branchNumbers = {
        "Kasarani HQ": "254790680038", "Joska": "254791047850", "Kangari": "254710976254",
        "Naivasha": "254768016429", "Kitengela": "254704121122", "Kikuyu": "254741251973",
        "Kinoo": "254795459026", "Ruiru Mini": "254724588900", "Ruiru Jambo": "254728020018",
        "Zimmerman Base": "254707881200", "Zimmerman Express": "254701231370"
    };
    const SALES_TEAM = "254712345678";

    document.getElementById('customerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const branch = document.getElementById('custBranch').value;
        const msg = `*Customer Feedback*\nBranch: ${branch}\nName: ${document.getElementById('custName').value}\nMsg: ${document.getElementById('custMessage').value}`;
        const num = branchNumbers[branch] || "254790680038";
        window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
    });

    document.getElementById('vendorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = `*Supplier Inquiry*\nCompany: ${document.getElementById('vendCompany').value}\nMsg: ${document.getElementById('vendMessage').value}`;
        window.open(`https://wa.me/${SALES_TEAM}?text=${encodeURIComponent(msg)}`, '_blank');
    });

    // Mobile Menu Toggle Script
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');

        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', function() {
                navMenu.classList.toggle('active');
                const icon = menuBtn.querySelector('i');
                if (navMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }
    });
</script>
<script>
    // --- MOBILE MENU TOGGLE ---
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');

        // Only run if the button exists on this page
        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', function(e) {
                e.preventDefault(); 
                
                // 1. Open/Close the menu
                navMenu.classList.toggle('active');

                // 2. Change the Icon (Bars <-> X)
                const icon = menuBtn.querySelector('i');
                if (navMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }
    });
</script>
</body>
</html>
