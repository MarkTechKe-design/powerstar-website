        <input type="text" name="name" placeholder="Your Full Name" required style="width:100%;margin-bottom:10px;padding:10px;">
        <input type="email" name="_replyto" placeholder="Email" required style="width:100%;margin-bottom:10px;padding:10px;">
        <textarea name="message" placeholder="Your Message" required style="width:100%;margin-bottom:10px;padding:10px;"></textarea>
        <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
