<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products & Services - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .grid {
    display: grid;
    gap: 20px;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    padding: 40px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    text-align: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
  }
  .card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
  }
  .card h3 {
    margin: 12px 0;
    font-size: 18px;
    color: #0066FF; /* Primary corporate color */
  }
</style>
</head>
<body>

<header style="display:flex; align-items:center; justify-content:space-between; padding:20px; background:#0066FF; color:#fff;">
  <img src="assets/logo.png" alt="Powerstar Logo" style="height:60px;">
  <nav>
    <a href="index.html" style="color:#fff; margin:0 10px;">Home</a>
    <a href="services.html" style="color:#fff; margin:0 10px;">Products & Services</a>
    <a href="branches.html" style="color:#fff; margin:0 10px;">Branches</a>
    <a href="careers.html" style="color:#fff; margin:0 10px;">Careers</a>
    <a href="news.html" style="color:#fff; margin:0 10px;">News</a>
    <a href="media.html" style="color:#fff; margin:0 10px;">Media</a>
    <a href="contact.html" style="color:#fff; margin:0 10px;">Contact</a>
    <a href="loyalty.html" style="color:#fff; margin:0 10px;">Loyalty</a>
  </nav>
</header>

<main>
<h1 style="text-align:center; margin-top:40px; color:#0066FF;">Our Products & Services</h1>

<section class="grid">
  <div class="card">
    <img src="assets/services/bakery.jpg" alt="Bakery">
    <h3>Bakery</h3>
  </div>
  <div class="card">
    <img src="assets/services/deli.jpg" alt="Deli">
    <h3>Deli</h3>
  </div>
  <div class="card">
    <img src="assets/services/electronics.jpg" alt="Electronics">
    <h3>Electronics</h3>
  </div>
  <div class="card">
    <img src="assets/services/furniture.jpg" alt="Furniture">
    <h3>Furniture</h3>
  </div>
  <div class="card">
    <img src="assets/services/mattresses.jpg" alt="Mattresses">
    <h3>Mattresses</h3>
  </div>
  <div class="card">
    <img src="assets/services/stationery.jpg" alt="Stationery">
    <h3>Stationery</h3>
  </div>
  <div class="card">
    <img src="assets/services/clothing.jpg" alt="Clothing">
    <h3>Clothing</h3>
  </div>
  <div class="card">
    <img src="assets/services/personalcare.jpg" alt="Personal Care">
    <h3>Personal Care</h3>
  </div>
  <div class="card">
    <img src="assets/services/foodstaffs.jpg" alt="Food Staffs">
    <h3>Food Staffs</h3>
  </div>
</section>

</main>

<footer style="text-align:center; padding:20px; background:#0066FF; color:#fff; margin-top:40px;">
  © 2025 Powerstar Supermarkets — All rights reserved
</footer>

</body>
</html>
