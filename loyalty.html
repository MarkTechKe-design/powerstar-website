<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Card - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="Powerstar" style="height: 70px;">
        </a>
        
        <button class="mobile-toggle" id="mobile-menu-btn">
            <i class="fas fa-bars"></i>
        </button>

        <nav id="nav-menu">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="services.html">Products</a>
            <a href="branches.html">Branches</a>
            <a href="media.html">Media</a>
            <a href="loyalty.html">Loyalty</a>
            <a href="contact.html">Contact</a>
        </nav>
    </div>
</header>

<main class="container">
    <section class="loyalty-section" style="padding: 40px 0;">
        <div class="loyalty-card" style="max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); border-top: 5px solid #006838;">
            
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="color: #006838; margin-bottom: 10px; font-size: 1.8rem;">Join the Family</h2>
                <p style="color: #666;">Sign up for the Powerstar Loyalty Card via WhatsApp.</p>
            </div>
    
            <form id="loyaltyForm" class="contact-column"> <label>Full Name</label>
                <input type="text" id="fullName" placeholder="e.g. John Kamau" required>
    
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@email.com" required>
    
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required>
    
                <label>National ID</label>
                <input type="text" id="nationalId" placeholder="ID Number" required>
    
                <label>Date of Birth</label>
                <input type="date" id="dob" required>
    
                <label>Preferred Branch</label>
                <select id="branch" required>
                    <option value="" disabled selected>-- Select Your Branch --</option>
                    <option value="Kasarani HQ">Kasarani HQ</option>
                    <option value="Joska">Joska</option>
                    <option value="Kangari">Kangari</option>
                    <option value="Naivasha">Naivasha</option>
                    <option value="Kitengela">Kitengela</option>
                    <option value="Kikuyu">Kikuyu</option>
                    <option value="Kinoo">Kinoo</option>
                    <option value="Ruiru Mini">Ruiru Mini</option>
                    <option value="Ruiru Jambo">Ruiru Jambo</option>
                    <option value="Zimmerman Base">Zimmerman Base</option>
                    <option value="Zimmerman Express">Zimmerman Express</option>
                </select>
    
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">
                    <i class="fab fa-whatsapp"></i> Request Card via WhatsApp
                </button>
                
                <div id="loyaltyStatus" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
            </form>
        </div>
    </section>
</main>

<footer>
    <div class="footer-content">
        <div class="social-links">
            <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Follow Us</h4>
            <div class="icons-container">
                <a href="https://www.facebook.com/PowerstarSupermarkets" target="_blank"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.instagram.com/powerstar_supermarket_limited" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@powerstar_supermarkets" target="_blank"><i class="fab fa-tiktok"></i></a>
                <a href="https://x.com/powerstar_supermarket" target="_blank"><i class="fab fa-x-twitter"></i></a>
                <a href="https://www.linkedin.com/company/powerstar_supermarkets" target="_blank"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </div>
        <div class="copyright">
            <p>&copy; 2025 Powerstar Supermarkets. All Rights Reserved.</p>
        </div>
    </div>
</footer>

<script>
    const branchContacts = {
        "Kasarani HQ": "254790680038", "Joska": "254791047850", "Kangari": "254710976254",
        "Naivasha": "254768016429", "Kitengela": "254704121122", "Kikuyu": "254741251973",
        "Kinoo": "254795459026", "Ruiru Mini": "254724588900", "Ruiru Jambo": "254728020018",
        "Zimmerman Base": "254707881200", "Zimmerman Express": "254701231370"
    };

    document.getElementById('loyaltyForm').addEventListener('submit', function(e){
        e.preventDefault();
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const nationalId = document.getElementById('nationalId').value;
        const dob = document.getElementById('dob').value;
        const branchKey = document.getElementById('branch').value;
        const status = document.getElementById('loyaltyStatus');

        let targetNumber = branchContacts[branchKey] || "254790680038";

        const msg = `*New Loyalty Card Request*\nBranch: ${branchKey}\nName: ${fullName}\nPhone: ${phone}\nID: ${nationalId}\nEmail: ${email}\nDOB: ${dob}`;
        const url = `https://wa.me/${targetNumber}?text=${encodeURIComponent(msg)}`;

        status.innerText = "Redirecting to WhatsApp...";
        status.style.color = "green";

        setTimeout(() => { window.open(url, '_blank'); }, 1000);
    });

    // Mobile Menu Toggle
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');

        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', function() {
                navMenu.classList.toggle('active');
                const icon = menuBtn.querySelector('i');
                if (navMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }
    });
</script>

</body>
</html>
