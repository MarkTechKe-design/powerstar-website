<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Card - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
        <img src="assets/logo.png" alt="Powerstar Supermarkets" style="height: 90px; width: auto; object-fit: contain;">
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="services.html">Products & Services</a>
        <a href="branches.html">Branches</a>
        <a href="media.html">Media</a>
        <a href="loyalty.html" class="active">Loyalty</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="loyalty-section">
    <div class="loyalty-card">
        <h2 class="loyalty-title">Join the Family</h2>
        <p class="loyalty-subtitle">Sign up for the Powerstar Loyalty Card via WhatsApp and earn points every time you shop.</p>
        
        <form id="loyaltyForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="e.g. John Kamau" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="john@email.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" class="form-input" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required>
                <small style="color:#666; font-size:0.8em;">This will serve as your Card Number.</small>
            </div>

            <div class="form-group">
                <label>National ID Number</label>
                <input type="text" id="nationalId" class="form-input" placeholder="ID Number" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-input" required>
            </div>

            <div class="form-group">
                <label>Preferred Branch (Required)</label>
                <select id="branch" class="form-input" required>
                    <option value="" disabled selected>-- Select Your Branch --</option>
                    <option value="Kasarani HQ">Kasarani HQ</option>
                    <option value="Joska">Joska Branch</option>
                    <option value="Kangari">Kangari Branch</option>
                    <option value="Naivasha">Naivasha Branch</option>
                    <option value="Kitengela">Kitengela Branch</option>
                    <option value="Kikuyu">Kikuyu Branch</option>
                    <option value="Kinoo">Kinoo Branch</option>
                    <option value="Ruiru Mini">Ruiru Mini Branch</option>
                    <option value="Ruiru Jambo">Ruiru Jambo Branch</option>
                    <option value="Zimmerman Base">Zimmerman Base Branch</option>
                    <option value="Zimmerman Express">Zimmerman Express Branch</option>
                </select>
            </div>

            <button type="submit" class="btn-loyalty">
                <i class="fab fa-whatsapp"></i> Request Card via WhatsApp
            </button>
            
            <div id="loyaltyStatus"></div>
        </form>
    </div>
</section>

<footer>
    © 2025 Powerstar Supermarkets. All Rights Reserved.
</footer>

<script>
    // 1. CONFIGURATION: Branch WhatsApp Numbers
    const branchContacts = {
        "Kasarani HQ": "254790680038",
        "Joska": "254791047850",
        "Kangari": "254710976254",
        "Naivasha": "254768016429",
        "Kitengela": "254704121122",
        "Kikuyu": "254741251973",
        "Kinoo": "254795459026",
        "Ruiru Mini": "254724588900",
        "Ruiru Jambo": "254728020018",
        "Zimmerman Base": "254707881200",
        "Zimmerman Express": "254701231370"
    };

    const loyaltyForm = document.getElementById('loyaltyForm');
    
    loyaltyForm.addEventListener('submit', function(e){
        e.preventDefault();

        // Get Values
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const nationalId = document.getElementById('nationalId').value.trim();
        const dob = document.getElementById('dob').value;
        const branchKey = document.getElementById('branch').value;
        const status = document.getElementById('loyaltyStatus');

        // Validation
        if(!fullName || !email || !phone || !nationalId || !dob || !branchKey){
            status.textContent = "Please fill in all fields.";
            status.style.color = "red";
            return;
        }

        // Phone Validation (10 digits)
        const phonePattern = /^[0-9]{10}$/;
        if(!phonePattern.test(phone)){
            status.textContent = "Phone number must be exactly 10 digits (e.g., 0712345678).";
            status.style.color = "red";
            return;
        }

        // 2. Find the correct number for the selected branch
        let targetNumber = branchContacts[branchKey];

        // Fallback safety (if number not found, default to HQ)
        if (!targetNumber) {
            targetNumber = branchContacts["Kasarani HQ"]; 
        }

        // 3. Create the WhatsApp Message
        const whatsappMessage = 
            `*New Loyalty Card Request*\n` +
            `------------------------\n` +
            `*Branch:* ${branchKey}\n\n` +
            `*Applicant Details:*\n` +
            `Name: ${fullName}\n` +
            `Phone: ${phone}\n` +
            `ID Number: ${nationalId}\n` +
            `Email: ${email}\n` +
            `DOB: ${dob}\n\n` +
            `Please process my loyalty card application.`;

        // 4. Open WhatsApp
        const url = `https://wa.me/${targetNumber}?text=${encodeURIComponent(whatsappMessage)}`;
        
        // Show success message on screen
        status.textContent = `Redirecting to WhatsApp (${branchKey})...`;
        status.style.color = "green";
        status.style.fontWeight = "bold";

        // Open in new tab
        setTimeout(() => {
            window.open(url, '_blank');
        }, 1000);
    });
</script>

</body>
</html>
