<section class="loyalty">
  <h2>Request a Loyalty Card</h2>
  <p>Fill in the details below. Your request will be processed within 24 hours.</p>

  <form id="loyaltyForm" action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">

    <!-- SECURITY SETTINGS -->
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_subject" value="New Loyalty Card Request">

    <label>Full Name</label>
    <input type="text" name="Full Name" required>

    <label>Phone Number (Registered with ID)</label>
    <input type="tel" name="Phone Number" required>

    <label>National ID Number</label>
    <input type="text" name="National ID" required>

    <label>Date of Birth</label>
    <input type="date" name="Date of Birth" required>

    <label>Select Branch</label>
    <select name="Branch" required>
      <option value="">-- Select Branch --</option>
      <option value="Kasarani Branch">Kasarani</option>
      <option value="Zimmerman Base Branch">Zimmerma Base</option>
      <option value="Zimmerman Express Branch">Zimmerman Express</option>
      <option value="Ruiru Mini Branch">Ruiru Mini</option>
      <option value="Ruiru Jambo Branch">Ruiru Jambo</option>
      <option value="Kangari Branch">Kangari</option>
      <option value="Joska Branch">Joska</option>
      <option value="Kinoo Branch">Kinoo</option>
      <option value="Kikuyu Branch">Kikuyu</option>
      <option value="Naivasha Branch">Naivasha</option>
      <option value="Kitengela Branch">Kitengela</option>
    </select>

    <button type="submit">Submit Request</button>
  </form>

  <div id="successPopup" class="popup">
    <p>✔ Your request has been sent! Your card will be active within 24 hours.  
    Use your phone number as your loyalty number. Thank you!</p>
  </div>
</section>
