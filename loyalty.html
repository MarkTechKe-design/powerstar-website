<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Card - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
        <img src="assets/logo.png" alt="Powerstar Supermarkets" style="height: 90px; width: auto; object-fit: contain;">
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="products.html">Products</a>
        <a href="branches.html">Branches</a>
        <a href="media.html">Media</a>
        <a href="loyalty.html" class="active">Loyalty</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="loyalty-section">
    <div class="loyalty-card">
        <h2 class="loyalty-title">Join the Family</h2>
        <p class="loyalty-subtitle">Sign up for the Powerstar Loyalty Card and earn points every time you shop.</p>
        
        <form id="loyaltyForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="e.g. John Kamau" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="john@email.com" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" class="form-input" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required>
                <small style="color:#666; font-size:0.8em;">This will serve as your Card Number.</small>
            </div>

            <div class="form-group">
                <label>National ID Number</label>
                <input type="text" id="nationalId" class="form-input" placeholder="ID Number" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-input" required>
            </div>

            <div class="form-group">
                <label>Preferred Branch</label>
                <select id="branch" class="form-input" required>
                    <option value="">-- Select Your Branch --</option>
                    <option value="Kasarani HQ">Kasarani HQ</option>
                    <option value="Joska">Joska</option>
                    <option value="Kangari">Kangari</option>
                    <option value="Naivasha">Naivasha</option>
                    <option value="Kitengela">Kitengela</option>
                    <option value="Kikuyu">Kikuyu</option>
                    <option value="Kinoo">Kinoo</option>
                    <option value="Ruiru Mini">Ruiru Mini</option>
                    <option value="Ruiru Jambo">Ruiru Jambo</option>
                    <option value="Zimmerman Base">Zimmerman Base</option>
                    <option value="Zimmerman Express">Zimmerman Express</option>
                </select>
            </div>

            <button type="submit" class="btn-loyalty">Request Card</button>
            
            <div id="loyaltyStatus"></div>
        </form>
    </div>
</section>

<footer>
    © 2025 Powerstar Supermarkets. All Rights Reserved.
</footer>

<script>
    const loyaltyForm = document.getElementById('loyaltyForm');
    
    loyaltyForm.addEventListener('submit', async function(e){
        e.preventDefault();

        // Get Values
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const nationalId = document.getElementById('nationalId').value.trim();
        const dob = document.getElementById('dob').value;
        const branch = document.getElementById('branch').value;
        const status = document.getElementById('loyaltyStatus');

        // Reset Status
        status.textContent = "Sending request...";
        status.style.backgroundColor = "#fff3cd"; // Yellow warning color
        status.style.color = "#856404";

        // Validation
        if(!fullName || !email || !phone || !nationalId || !dob || !branch){
            status.textContent = "Please fill in all fields.";
            status.style.color = "red";
            status.style.backgroundColor = "#f8d7da";
            return;
        }

        // Phone Validation (10 digits)
        const phonePattern = /^[0-9]{10}$/;
        if(!phonePattern.test(phone)){
            status.textContent = "Phone number must be exactly 10 digits (e.g., 0712345678).";
            status.style.color = "red";
            status.style.backgroundColor = "#f8d7da";
            return;
        }

        // Send to Formspree
        const FORM_ACTION = "https://formspree.io/f/mjkneeow";

        try {
            const res = await fetch(FORM_ACTION, {
                method: "POST",
                headers: { 'Content-Type':'application/json', 'Accept':'application/json' },
                body: JSON.stringify({ 
                    subject: "New Loyalty Card Request", // Helps you identify email
                    fullName, email, phone, nationalId, dob, branch 
                })
            });

            if(res.ok){
                // Success
                status.textContent = `Request Successful! Your phone number (${phone}) will be active as your loyalty card within 24 hours.`;
                status.style.backgroundColor = "#d4edda"; // Light green background
                status.style.color = "#155724"; // Dark green text
                loyaltyForm.reset();
            } else {
                // Error from Server
                status.textContent = "Failed to send. Please try again later.";
                status.style.backgroundColor = "#f8d7da";
                status.style.color = "#721c24";
            }
        } catch(err){
            // Network Error
            status.textContent = "Network error. Please check your internet connection.";
            status.style.backgroundColor = "#f8d7da";
            status.style.color = "#721c24";
        }
    });
</script>

</body>
</html>
