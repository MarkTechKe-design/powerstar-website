<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loyalty Card - Powerstar Supermarkets</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<header>
    <a href="index.html" style="display: flex; align-items: center; text-decoration: none;">
        <img src="assets/logo.png" alt="Powerstar Supermarkets" style="height: 90px; width: auto; object-fit: contain;">
    </a>
    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="services.html">Products & Services</a>
        <a href="branches.html">Branches</a>
        <a href="media.html">Media</a>
        <a href="loyalty.html" class="active">Loyalty</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="loyalty-section">
    <div class="loyalty-card">
        <h2 style="text-align: center; color: #006838; margin-bottom: 10px;">Join the Family</h2>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">Sign up for the Powerstar Loyalty Card via WhatsApp.</p>
        
        <form id="loyaltyForm">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Full Name</label>
            <input type="text" id="fullName" placeholder="e.g. John Kamau" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Email Address</label>
            <input type="email" id="email" placeholder="john@email.com" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Phone Number</label>
            <input type="tel" id="phone" placeholder="07XX XXX XXX" pattern="[0-9]{10}" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; display: block; margin-bottom: 5px;">National ID</label>
            <input type="text" id="nationalId" placeholder="ID Number" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Date of Birth</label>
            <input type="date" id="dob" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">

            <label style="font-weight: bold; display: block; margin-bottom: 5px;">Preferred Branch</label>
            <select id="branch" required style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px;">
                <option value="" disabled selected>-- Select Your Branch --</option>
                <option value="Kasarani HQ">Kasarani HQ</option>
                <option value="Joska">Joska</option>
                <option value="Kangari">Kangari</option>
                <option value="Naivasha">Naivasha</option>
                <option value="Kitengela">Kitengela</option>
                <option value="Kikuyu">Kikuyu</option>
                <option value="Kinoo">Kinoo</option>
                <option value="Ruiru Mini">Ruiru Mini</option>
                <option value="Ruiru Jambo">Ruiru Jambo</option>
                <option value="Zimmerman Base">Zimmerman Base</option>
                <option value="Zimmerman Express">Zimmerman Express</option>
            </select>

            <button type="submit" class="btn-loyalty">
                <i class="fab fa-whatsapp"></i> Request Card via WhatsApp
            </button>
            <div id="loyaltyStatus" style="text-align: center; margin-top: 15px; font-weight: bold;"></div>
        </form>
    </div>
</section>

<footer>
    <div class="footer-content">
        
        <div class="social-links">
            <h4 style="margin-bottom: 15px; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px;">Follow Us</h4>
            
            <div class="icons-container">
                <a href="https://www.facebook.com/PowerstarSupermarkets" target="_blank" aria-label="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://www.instagram.com/powerstar_supermarket_limited" target="_blank" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.tiktok.com/@powerstar_supermarkets" target="_blank" aria-label="TikTok">
                    <i class="fab fa-tiktok"></i>
                </a>

                <a href="https://x.com/powerstar_supermarket" target="_blank" aria-label="X">
                    <i class="fab fa-x-twitter"></i>
                </a>

                <a href="https://www.linkedin.com/company/powerstar_supermarkets" target="_blank" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </div>
        </div>

        <div class="copyright">
            <p>&copy; 2025 Powerstar Supermarkets. All Rights Reserved.</p>
        </div>
    </div>
</footer>


<script>
    const branchContacts = {
        "Kasarani HQ": "254790680038",
        "Joska": "254791047850",
        "Kangari": "254710976254",
        "Naivasha": "254768016429",
        "Kitengela": "254704121122",
        "Kikuyu": "254741251973",
        "Kinoo": "254795459026",
        "Ruiru Mini": "254724588900",
        "Ruiru Jambo": "254728020018",
        "Zimmerman Base": "254707881200",
        "Zimmerman Express": "254701231370"
    };

    document.getElementById('loyaltyForm').addEventListener('submit', function(e){
        e.preventDefault();
        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone').value;
        const nationalId = document.getElementById('nationalId').value;
        const dob = document.getElementById('dob').value;
        const branchKey = document.getElementById('branch').value;
        const status = document.getElementById('loyaltyStatus');

        let targetNumber = branchContacts[branchKey] || "254790680038"; // Default to HQ if logic fails

        const msg = `*New Loyalty Card Request*\nBranch: ${branchKey}\nName: ${fullName}\nPhone: ${phone}\nID: ${nationalId}\nEmail: ${email}\nDOB: ${dob}`;
        
        const url = `https://wa.me/${targetNumber}?text=${encodeURIComponent(msg)}`;
        
        status.innerText = "Redirecting to WhatsApp...";
        status.style.color = "green";
        
        setTimeout(() => { window.open(url, '_blank'); }, 1000);
    });
</script>
<script>
    // --- MOBILE MENU TOGGLE SCRIPT ---
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');

        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', function() {
                // Toggle the .active class
                navMenu.classList.toggle('active');
                
                // Optional: Change icon from Bars to X
                const icon = menuBtn.querySelector('i');
                if (navMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars');
                    icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times');
                    icon.classList.add('fa-bars');
                }
            });
        }
    });
</script>
</body>
</html>
