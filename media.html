<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media & Gallery - Powerstar Supermarkets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
    /* --- INTERNAL GALLERY STYLES --- */
    :root {
        --ps-red: #DA291C;
        --ps-green: #006838;
        --ps-dark: #1a1a1a;
        --transition: all 0.3s ease;
    }

    body { font-family: 'Poppins', sans-serif; background: #f9f9f9; }

    /* Hero Override */
    .hero-gallery {
        background: linear-gradient(rgba(0, 104, 56, 0.9), rgba(0, 50, 20, 0.9)), url('assets/supermarket-bg.jpg');
        background-size: cover; background-position: center;
        height: 40vh;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; text-align: center;
        padding: 20px;
    }
    .hero-gallery h1 { font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

    /* Filter Buttons */
    .filter-container {
        display: flex; justify-content: center; flex-wrap: wrap; gap: 15px;
        margin: 50px 0 30px;
    }
    .filter-btn {
        background: white; border: 1px solid #ddd; padding: 10px 25px;
        border-radius: 50px; cursor: pointer; font-weight: 600; color: #555;
        transition: var(--transition); text-transform: uppercase; font-size: 0.85rem;
    }
    .filter-btn:hover, .filter-btn.active {
        background: var(--ps-red); color: white; border-color: var(--ps-red);
        transform: translateY(-2px); box-shadow: 0 5px 15px rgba(218, 41, 28, 0.3);
    }

    /* Masonry Grid */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 25px;
        padding-bottom: 80px;
    }

    .gallery-item {
        position: relative;
        height: 300px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        background: white;
    }

    /* Image Animation */
    .gallery-item img {
        width: 100%; height: 100%;
        object-fit: cover;
        transition: transform 0.5s ease;
    }
    .gallery-item:hover img {
        transform: scale(1.1);
    }

    /* Overlay Styling */
    .gallery-overlay {
        position: absolute;
        bottom: 0; left: 0; right: 0; top: 0;
        background: rgba(0, 104, 56, 0.85); /* Powerstar Green Overlay */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: var(--transition);
        padding: 20px;
        text-align: center;
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }

    .overlay-title {
        color: white; font-weight: 700; font-size: 1.2rem;
        transform: translateY(20px); transition: var(--transition);
    }
    .overlay-cat {
        color: #ddd; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
        margin-top: 5px; transform: translateY(20px); transition: var(--transition); transition-delay: 0.1s;
    }
    .gallery-item:hover .overlay-title, 
    .gallery-item:hover .overlay-cat { transform: translateY(0); }

    /* Lightbox (Modal) */
    .lightbox {
        display: none; position: fixed; z-index: 9999;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9);
        justify-content: center; align-items: center;
        padding: 20px;
    }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90%; max-height: 85vh; border-radius: 5px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
    .lightbox-close {
        position: absolute; top: 30px; right: 30px;
        color: white; font-size: 2rem; cursor: pointer; transition: 0.3s;
    }
    .lightbox-close:hover { color: var(--ps-red); }

    /* Hide items when filtering */
    .gallery-item.hide { display: none; }

</style>
</head>
<body>

        <nav class="nav-menu" id="nav-menu">

        <figure class="gallery-item" data-category="events" onclick="openLightbox(this)">
            <img src="assets/winner2.jpg" alt="School Fees Winner" onerror="this.src='https://placehold.co/600x600/eee/333?text=Happy+Winner'">
            <div class="gallery-overlay">
                <div class="overlay-title">School Fees Winner</div>
                <div class="overlay-cat">Kangari Branch</div>
                <i class="fas fa-search-plus" style="color:white; margin-top:15px; font-size:1.5rem;"></i>
            </div>
        </figure>

        <figure class="gallery-item" data-category="store" onclick="openLightbox(this)">
            <img src="assets/fresh-veg.jpg" alt="Fresh Produce" onerror="this.src='https://placehold.co/600x600/006838/fff?text=Farm+Fresh'">
            <div class="gallery-overlay">
                <div class="overlay-title">Farm Fresh</div>
                <div class="overlay-cat">Daily Delivery</div>

</main>

<script>
    // --- 1. MOBILE MENU TOGGLE ---
    document.addEventListener('DOMContentLoaded', function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const navMenu = document.getElementById('nav-menu');
        if (menuBtn && navMenu) {
            menuBtn.addEventListener('click', function(e) {
                e.preventDefault(); 
                navMenu.classList.toggle('active');
                const icon = menuBtn.querySelector('i');
                if (navMenu.classList.contains('active')) {
                    icon.classList.remove('fa-bars'); icon.classList.add('fa-times');
                } else {
                    icon.classList.remove('fa-times'); icon.classList.add('fa-bars');
                }
            });
        }
    });

    // --- 2. GALLERY FILTERING ---
    function filterGallery(category, btn) {
        // Update Button Active State
        const buttons = document.querySelectorAll('.filter-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Filter Items
        const items = document.querySelectorAll('.gallery-item');
        items.forEach(item => {
            if (category === 'all' || item.getAttribute('data-category') === category) {
                item.classList.remove('hide');
                item.style.animation = 'fadeIn 0.5s ease';
            } else {
                item.classList.add('hide');
            }
        });
    }

    // --- 3. LIGHTBOX FUNCTIONALITY ---
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    function openLightbox(element) {
        const img = element.querySelector('img');
        lightboxImg.src = img.src; // Get source from the clicked item
        lightbox.classList.add('active');
        document.body.style.overflow = 'hidden'; // Stop scrolling behind modal
    }

    function closeLightbox() {
        lightbox.classList.remove('active');
        document.body.style.overflow = 'auto'; // Re-enable scrolling
    }

    // Close lightbox when clicking outside the image
    lightbox.addEventListener('click', function(e) {
        if (e.target === lightbox) {
            closeLightbox();
        }
    });
</script>

<style>
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 768px) {
        .mobile-toggle { display: block; }
        .nav-menu { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; width: 100%; background: white; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-menu.active { display: flex; }
        .hero-gallery h1 { font-size: 2rem; }
    }
</style>
